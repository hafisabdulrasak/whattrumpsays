name: Sync Truth Social Data

# Fetches posts via the public RSS feed — Cloudflare whitelists RSS crawlers
# so this works from GitHub Actions without a browser or bearer token.
# On success, commits data/posts.json and Vercel auto-redeploys.

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    name: Fetch & commit posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # No Python, no Playwright, no Chromium — just a plain HTTP GET to the RSS feed
      - name: Fetch latest posts (RSS feed)
        run: node scripts/fetch_rss.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/posts.json data/truthsocial-sync-status.json

          if git diff --staged --quiet; then
            echo "No new posts — nothing to commit."
          else
            COUNT=$(node -e "const d=require('./data/posts.json');console.log(d.length)")
            git commit -m "chore: sync Truth Social data (${COUNT} posts) [skip ci]"
            git push
            echo "Pushed ${COUNT} posts — Vercel will redeploy automatically."
          fi
