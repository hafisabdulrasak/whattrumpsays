name: Sync Truth Social Data

# Runs every 2 hours and on manual dispatch.
# Uses a real Chromium browser (Playwright) to bypass Cloudflare, then
# commits data/posts.json so Vercel auto-redeploys with fresh content.
#
# Required GitHub secrets:
#   TRUTHSOCIAL_USERNAME  — Truth Social login username
#   TRUTHSOCIAL_PASSWORD  — Truth Social login password
#   TRUTHSOCIAL_TOKEN     — (optional) bearer token, skips login if set

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # allow manual run from the Actions tab

permissions:
  contents: write             # needed to push updated data

jobs:
  sync:
    name: Fetch & commit posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # playwright install --with-deps pulls the system libs Chromium needs
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # The Playwright script launches a real browser, solves the Cloudflare
      # JS challenge, scrolls the profile page, and intercepts API responses.
      - name: Fetch latest posts (Playwright browser)
        env:
          TRUTHSOCIAL_USERNAME: ${{ secrets.TRUTHSOCIAL_USERNAME }}
          TRUTHSOCIAL_PASSWORD: ${{ secrets.TRUTHSOCIAL_PASSWORD }}
          TRUTHSOCIAL_TOKEN:    ${{ secrets.TRUTHSOCIAL_TOKEN }}
        run: python scripts/fetch_playwright.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/posts.json data/truthsocial-sync-status.json

          if git diff --staged --quiet; then
            echo "No new posts — nothing to commit."
          else
            COUNT=$(python3 -c "import json; d=json.load(open('data/posts.json')); print(len(d))")
            git commit -m "chore: sync Truth Social data (${COUNT} posts) [skip ci]"
            git push
            echo "Pushed updated data — Vercel will redeploy automatically."
          fi
