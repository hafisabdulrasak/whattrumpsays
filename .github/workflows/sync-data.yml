name: Sync Truth Social Data

# Runs every 2 hours and on manual dispatch.
# Fetches new posts from the Truth Social API, commits data/posts.json,
# and Vercel auto-redeploys when the push lands on main.

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # allow manual run from Actions tab

permissions:
  contents: write             # needed to push the updated data file

jobs:
  sync:
    name: Fetch & commit posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — it has write access via permissions above.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest posts from Truth Social API
        env:
          TRUTHSOCIAL_TOKEN: ${{ secrets.TRUTHSOCIAL_TOKEN }}
        run: node scripts/fetch_api.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/posts.json data/truthsocial-sync-status.json

          if git diff --staged --quiet; then
            echo "No new posts — nothing to commit."
          else
            COUNT=$(node -e "const d=require('./data/posts.json');console.log(d.length)")
            git commit -m "chore: sync Truth Social data (${COUNT} posts) [skip ci]"
            git push
            echo "Pushed updated data — Vercel will redeploy automatically."
          fi
